name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build client
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -d dist || { echo "Client build failed"; exit 1; }
          test -f dist/server.cjs || { echo "Server build failed"; exit 1; }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 5
